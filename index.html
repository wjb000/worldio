        let currentEmotionKey = 'happy';
        let mainCanvas, mainCtx;
        let isBlinking = false;

        function drawFace(canvas, emotionKey, pixelSize = 12, blink = false) {
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            const emotion = emotions[emotionKey];
            if (!emotion) return;
            
            let matrix = JSON.parse(JSON.stringify(emotion.matrix)); // clone
            
            // Simple blink effect for supported faces
            if (blink && (emotionKey === 'happy' || emotionKey === 'sad' || emotionKey === 'sleepy' || emotionKey === 'neutral')) {
                matrix[1] = [0,0,0,0,0,0,0,0];
                matrix[2] = [0,0,0,0,0,0,0,0];
            }
            
            const rows = matrix.length;
            const cols = matrix[0].length;
            
            // Dark screen background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // LED green with nice glow
            ctx.fillStyle = '#22ff88';
            ctx.shadowColor = '#22ff88';
            ctx.shadowBlur = pixelSize >= 12 ? 4 : 2;
            
            const gap = 1;
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (matrix[y][x] === 1) {
                        const px = x * pixelSize;
                        const py = y * pixelSize;
                        ctx.fillRect(px, py, pixelSize - gap, pixelSize - gap);
                    }
                }
            }
            
            ctx.shadowBlur = 0;
            
            // Subtle pixel border for more LED feel
            ctx.strokeStyle = 'rgba(34, 255, 136, 0.15)';
            ctx.lineWidth = 1;
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (matrix[y][x] === 1) {
                        const px = x * pixelSize;
                        const py = y * pixelSize;
                        ctx.strokeRect(px, py, pixelSize - gap, pixelSize - gap);
                    }
                }
            }
        }

        function updateMainScreen(emotionKey, doBlink = false) {
            currentEmotionKey = emotionKey;
            
            const label = document.getElementById('current-emotion');
            label.textContent = emotions[emotionKey].name;
            
            drawFace(mainCanvas, emotionKey, 48, doBlink);
            
            // Highlight active button
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                btn.classList.remove('active', 'border-emerald-400');
                if (btn.dataset.emotion === emotionKey) {
                    btn.classList.add('active', 'border-emerald-400');
                }
            });
        }

        function createEmotionButton(key) {
            const emotion = emotions[key];
            const btn = document.createElement('button');
            btn.className = `emotion-btn flex flex-col items-center p-2.5 bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-2xl w-full`;
            btn.dataset.emotion = key;
            
            const mini = document.createElement('canvas');
            mini.width = 72;
            mini.height = 72;
            mini.className = 'pixel-canvas rounded-2xl bg-[#050505]';
            
            drawFace(mini, key, 9);
            
            const label = document.createElement('div');
            label.className = 'text-[10px] font-medium text-center mt-2 text-zinc-300 tracking-tight';
            label.textContent = emotion.name;
            
            btn.appendChild(mini);
            btn.appendChild(label);
            
            btn.onclick = () => updateMainScreen(key);
            
            return btn;
        }

        function initEmotionGrid() {
            const grid = document.getElementById('emotion-grid');
            grid.innerHTML = '';
            
            Object.keys(emotions).forEach(key => {
                const btn = createEmotionButton(key);
                grid.appendChild(btn);
            });
        }

        function randomEmotion() {
            const keys = Object.keys(emotions);
            let newKey;
            do {
                newKey = keys[Math.floor(Math.random() * keys.length)];
            } while (newKey === currentEmotionKey && keys.length > 1);
            
            updateMainScreen(newKey);
        }

        function blinkOnce() {
            const original = currentEmotionKey;
            updateMainScreen(original, true);
            
            setTimeout(() => {
                if (currentEmotionKey === original) {
                    updateMainScreen(original, false);
                }
            }, 180);
        }

        function init() {
            mainCanvas = document.getElementById('main-screen');
            
            initEmotionGrid();
            updateMainScreen('happy');
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'r') randomEmotion();
                if (e.key.toLowerCase() === 'b') blinkOnce();
            });
            
            // Click big screen = random
            mainCanvas.addEventListener('click', randomEmotion);
            
            // Auto demo blink every 12 seconds
            setInterval(() => {
                if (!document.hidden && Math.random() > 0.6) {
                    blinkOnce();
                }
            }, 12000);
        }

        window.onload = init;
