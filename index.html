<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patent Research • AI Summary Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .section-header { font-size: 0.75rem; letter-spacing: 1px; font-weight: 600; color: #64748b; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-5xl mx-auto px-6 pt-8 pb-16">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-search text-zinc-950 text-2xl"></i>
                </div>
                <div>
                    <span class="font-semibold text-3xl tracking-tight">Patent Research</span>
                    <span class="text-emerald-400 text-sm ml-2">AI Summary Tool</span>
                </div>
            </div>
            <div class="text-xs px-3 py-1 bg-zinc-900 rounded-full border border-zinc-700 text-zinc-400">
                Powered by Google Patents + AI
            </div>
        </div>

        <!-- Search Section -->
        <div class="mb-10">
            <div class="section-header mb-2 px-1">SEARCH PATENTS</div>
            <div class="flex gap-3">
                <input id="search-input" type="text" 
                       class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-emerald-400 px-5 py-4 rounded-3xl text-lg placeholder:text-zinc-500"
                       placeholder="Search keywords, inventor, company, or technology...">
                <button onclick="searchPatents()" 
                        class="px-8 py-4 bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-semibold rounded-3xl flex items-center gap-x-2 transition">
                    <i class="fa-solid fa-search"></i>
                    <span>Search</span>
                </button>
            </div>
            <div class="text-xs text-zinc-500 mt-2 px-2">Opens Google Patents with your query</div>
        </div>

        <!-- Patent Lookup -->
        <div class="mb-10">
            <div class="section-header mb-2 px-1">LOOKUP BY PATENT NUMBER</div>
            <div class="flex gap-3">
                <input id="patent-number" type="text" 
                       class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-emerald-400 px-5 py-4 rounded-3xl text-lg placeholder:text-zinc-500"
                       placeholder="e.g. US11223344 or WO2023123456">
                <button onclick="lookupPatent()" 
                        class="px-8 py-4 bg-white text-zinc-950 font-semibold rounded-3xl flex items-center gap-x-2 hover:bg-zinc-100 transition">
                    <span>Analyze</span>
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden mb-10">
            <div class="section-header mb-3 px-1">PATENT DETAILS</div>
            
            <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                <div id="patent-header" class="mb-4"></div>
                
                <div class="mb-6">
                    <div class="text-xs text-zinc-400 mb-1">TITLE</div>
                    <div id="patent-title" class="font-medium text-lg"></div>
                </div>

                <div class="mb-6">
                    <div class="text-xs text-zinc-400 mb-1">ABSTRACT / DESCRIPTION</div>
                    <div id="patent-abstract" class="text-sm text-zinc-300 leading-relaxed"></div>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button onclick="openGooglePatents()" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-external-link-alt"></i>
                        <span>View on Google Patents</span>
                    </button>
                    <button onclick="openPDF()" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span>Open PDF</span>
                    </button>
                    <button onclick="generateAISummary()" class="px-5 py-3 bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-semibold rounded-2xl text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-robot"></i>
                        <span>Get AI Summary Prompt</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- AI Summary Helper -->
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
            <div class="section-header mb-3">AI SUMMARY HELPER</div>
            <p class="text-sm text-zinc-400 mb-4">Paste any patent text below to generate a strong prompt for ChatGPT, Claude, or Grok.</p>
            
            <textarea id="summary-input" rows="7" 
                      class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-4 text-sm font-mono placeholder:text-zinc-500"
                      placeholder="Paste abstract, claims, or description here..."></textarea>
            
            <div class="flex gap-3 mt-4">
                <button onclick="generatePrompt()" 
                        class="flex-1 py-3 bg-white text-zinc-950 font-semibold rounded-2xl hover:bg-zinc-100 transition">
                    Generate Prompt
                </button>
                <button onclick="copyPrompt()" 
                        class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-x-2">
                    <i class="fa-solid fa-copy"></i>
                    <span>Copy to Clipboard</span>
                </button>
            </div>
            
            <div id="generated-prompt" class="hidden mt-4 p-4 bg-zinc-950 border border-zinc-700 rounded-2xl text-sm font-mono whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let currentPatent = null;

        function searchPatents() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            window.open(`https://patents.google.com/?q=${encodeURIComponent(query)}`, '_blank');
        }

        function lookupPatent() {
            const number = document.getElementById('patent-number').value.trim().toUpperCase();
            if (!number) return;

            window.open(`https://patents.google.com/patent/${number}`, '_blank');

            const results = document.getElementById('results-section');
            results.classList.remove('hidden');
            
            document.getElementById('patent-header').innerHTML = `
                <div class="px-3 py-1 bg-emerald-900 text-emerald-400 text-xs rounded-full font-mono w-fit">${number}</div>
            `;
            
            document.getElementById('patent-title').textContent = "Opened in new tab";
            document.getElementById('patent-abstract').innerHTML = "After opening the patent, copy the abstract or claims and paste it in the <strong>AI Summary Helper</strong> below for a great summary prompt.";
            
            currentPatent = { number };
        }

        function openGooglePatents() {
            if (currentPatent) {
                window.open(`https://patents.google.com/patent/${currentPatent.number}`, '_blank');
            }
        }

        function openPDF() {
            if (currentPatent) {
                window.open(`https://patents.google.com/patent/${currentPatent.number}/en`, '_blank');
            }
        }

        function generateAISummary() {
            const promptBox = document.getElementById('generated-prompt');
            promptBox.classList.remove('hidden');
            
            const prompt = `You are a senior patent analyst. Summarize this patent clearly:

• Problem it solves
• Core technical solution
• Novel aspects
• Commercial applications
• Strength of claims

Patent text:
[PASTE TEXT HERE]`;
            
            promptBox.innerHTML = prompt;
            navigator.clipboard.writeText(prompt);
        }

        function generatePrompt() {
            const text = document.getElementById('summary-input').value.trim();
            if (!text) return alert("Please paste some text first.");

            const prompt = `You are an expert patent analyst. Provide a structured summary of this patent.

Focus on:
- Problem solved
- Key innovation
- Main claims
- Potential uses
- Strengths/weaknesses

Patent text:
${text}`;

            const output = document.getElementById('generated-prompt');
            output.classList.remove('hidden');
            output.innerHTML = prompt;
            navigator.clipboard.writeText(prompt);
        }

        function copyPrompt() {
            const output = document.getElementById('generated-prompt');
            if (output.innerText) {
                navigator.clipboard.writeText(output.innerText);
                alert("Prompt copied!");
            }
        }

        // Enter key support
        document.getElementById('search-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchPatents();
        });
        document.getElementById('patent-number').addEventListener('keypress', e => {
            if (e.key === 'Enter') lookupPatent();
        });
    </script>
</body>
</html>
