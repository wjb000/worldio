<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Square • WorldIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #666;
            font-size: 13px;
            z-index: 10;
            pointer-events: none;
        }
        
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">three.js • rotating square</div>
    
    <script>
        // Three.js Simple Scene with a Square
        let scene, camera, renderer;
        let square;

        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            // Square (using PlaneGeometry for a flat square)
            const geometry = new THREE.PlaneGeometry(2, 2);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x22d3ee, 
                shininess: 80,
                flatShading: false
            });
            square = new THREE.Mesh(geometry, material);
            scene.add(square);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(3, 5, 4);
            scene.add(directionalLight);
            
            // Optional second light for better shading
            const dirLight2 = new THREE.DirectionalLight(0x22d3ee, 0.3);
            dirLight2.position.set(-4, -2, -3);
            scene.add(dirLight2);
            
            // Handle resize
            window.addEventListener('resize', onWindowResize);
            
            // Start animation
            animate();
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Gentle rotation - makes the square come alive
            square.rotation.x += 0.008;
            square.rotation.y += 0.012;
            
            renderer.render(scene, camera);
        }
        
        // Boot
        init();
    </script>
</body>
</html>
